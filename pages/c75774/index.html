      <span class="token keyword">const</span> lastDayofLastMonth <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Date</span><span class="token punctuation">(</span>year<span class="token punctuation">,</span> month <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">,</span> <span class="token number">0</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 上个月的最后一天</span>
      <span class="token keyword">const</span> lastDateofLastMonth <span class="token operator">=</span> lastDayofLastMonth<span class="token punctuation">.</span><span class="token function">getDate</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
      <span class="token comment">// 上个月的具体日期</span>
      <span class="token keyword">const</span> preMonthDayCount <span class="token operator">=</span> firstDayWeekDay <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">;</span> <span class="token comment">// 上个月在第一行要显示几天</span>

      <span class="token keyword">const</span> lastDay <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Date</span><span class="token punctuation">(</span>year<span class="token punctuation">,</span> month<span class="token punctuation">,</span> <span class="token number">0</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 这个月的最后一天</span>
      <span class="token keyword">const</span> lastData <span class="token operator">=</span> lastDay<span class="token punctuation">.</span><span class="token function">getDate</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
      <span class="token comment">// 每页显示42条数据</span>
      <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token keyword">var</span> i <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span> i <span class="token operator">&lt;</span> <span class="token number">6</span> <span class="token operator">*</span> <span class="token number">7</span><span class="token punctuation">;</span> i<span class="token operator">++</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">const</span> date <span class="token operator">=</span> i <span class="token operator">+</span> <span class="token number">1</span> <span class="token operator">-</span> preMonthDayCount<span class="token punctuation">;</span> <span class="token comment">// 赋值date的值，这里上个月的最后一天为0</span>
        <span class="token keyword">let</span> showDate <span class="token operator">=</span> date<span class="token punctuation">;</span> <span class="token comment">// 赋值showDate，上下月份，下面再做判断</span>
        <span class="token keyword">let</span> thisMonth <span class="token operator">=</span> month<span class="token punctuation">;</span> <span class="token comment">// 赋值月份</span>

        <span class="token keyword">if</span> <span class="token punctuation">(</span>date <span class="token operator">&lt;=</span> <span class="token number">0</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
          <span class="token comment">// 当date &lt; 0时，则代表是上一个月</span>
          thisMonth <span class="token operator">=</span> month <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">;</span> <span class="token comment">// 月份减一</span>
          showDate <span class="token operator">=</span> lastDateofLastMonth <span class="token operator">+</span> date<span class="token punctuation">;</span> <span class="token comment">// 显示上一个相应是几号</span>
        <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token keyword">if</span> <span class="token punctuation">(</span>date <span class="token operator">&gt;</span> lastData<span class="token punctuation">)</span> <span class="token punctuation">{</span>
          <span class="token comment">// 当date大于了这个月最后一天，那么代表下个月</span>
          thisMonth <span class="token operator">=</span> month <span class="token operator">+</span> <span class="token number">1</span><span class="token punctuation">;</span> <span class="token comment">// 月份加一</span>
          showDate <span class="token operator">=</span> showDate <span class="token operator">-</span> lastData<span class="token punctuation">;</span> <span class="token comment">// 显示下一个月具体几号</span>
        <span class="token punctuation">}</span> 

        <span class="token keyword">if</span> <span class="token punctuation">(</span>thisMonth <span class="token operator">===</span> <span class="token number">13</span><span class="token punctuation">)</span> thisMonth <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
        <span class="token comment">// 当我们月份是13的时候，代表下一年，月份置为一</span>
        <span class="token keyword">if</span> <span class="token punctuation">(</span>thisMonth <span class="token operator">===</span> <span class="token number">0</span><span class="token punctuation">)</span> thisMonth <span class="token operator">=</span> <span class="token number">12</span><span class="token punctuation">;</span>
        <span class="token comment">// 当我们月份是0的时候，代表上一年，月份置为一</span>
        result<span class="token punctuation">.</span><span class="token function">push</span><span class="token punctuation">(</span><span class="token punctuation">{</span>
          <span class="token literal-property property">date</span><span class="token operator">:</span> <span class="token template-string"><span class="token template-punctuation string">`</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">${</span>year<span class="token interpolation-punctuation punctuation">}</span></span><span class="token string">-</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">${</span><span class="token punctuation">(</span>thisMonth<span class="token operator">&lt;</span><span class="token number">10</span><span class="token operator">?</span><span class="token string">'0'</span><span class="token operator">+</span>thisMonth<span class="token operator">:</span>thisMonth<span class="token punctuation">)</span><span class="token interpolation-punctuation punctuation">}</span></span><span class="token string">-</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">${</span><span class="token punctuation">(</span>showDate<span class="token operator">&lt;</span><span class="token number">10</span><span class="token operator">?</span><span class="token string">'0'</span><span class="token operator">+</span>showDate<span class="token operator">:</span>showDate<span class="token punctuation">)</span><span class="token interpolation-punctuation punctuation">}</span></span><span class="token template-punctuation string">`</span></span><span class="token punctuation">,</span>
          <span class="token literal-property property">year</span><span class="token operator">:</span>year<span class="token punctuation">,</span>
          <span class="token literal-property property">month</span><span class="token operator">:</span> thisMonth<span class="token punctuation">,</span>
          <span class="token literal-property property">showDate</span><span class="token operator">:</span> showDate<span class="token punctuation">,</span>
        <span class="token punctuation">}</span><span class="token punctuation">)</span>
      <span class="token punctuation">}</span>
      <span class="token keyword">return</span> result<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
